<!DOCTYPE html>
<html>
<head>
<title>Fantasy League HQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏈 Fantasy League HQ</h1>

<input id="username" placeholder="Enter your name">

<nav>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('rankings')">Rankings</button>
<button onclick="showPage('history')">History</button>
</nav>

<div id="chat" class="page">
<div id="messages"></div>
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

<div id="rankings" class="page">
<ul id="rankingsList"></ul>
</div>

<div id="history" class="page">
<ul id="historyList"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
</body>
</html>

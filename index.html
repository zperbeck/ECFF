<!DOCTYPE html>
<html>
<head>
<title>Fantasy League HQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏈 Fantasy League HQ</h1>

<nav>
<button onclick="showPage('rankings')">Rankings</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('history')">History</button>
</nav>

<div id="rankings" class="page">
<h2>League Rankings</h2>
<ul id="rankingsList"></ul>
</div>

<div id="chat" class="page">
<h2>League Chat</h2>
<div id="messages"></div>
<input id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

<div id="history" class="page">
<h2>League History</h2>
<ul id="historyList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
